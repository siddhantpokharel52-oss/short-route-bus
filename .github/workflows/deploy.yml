name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfiles/Dockerfile.django
          push: true
          tags: kvbms/django:${{ github.sha }},kvbms/django:latest

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfiles/Dockerfile.fastapi
          push: true
          tags: kvbms/fastapi:${{ github.sha }},kvbms/fastapi:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfiles/Dockerfile.frontend
          push: true
          tags: kvbms/frontend:${{ github.sha }},kvbms/frontend:latest

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/kvbms
            docker compose -f docker/docker-compose.prod.yml pull
            docker compose -f docker/docker-compose.prod.yml up -d --no-deps
            docker compose -f docker/docker-compose.prod.yml exec -T django python backend/manage.py migrate
            docker image prune -f
