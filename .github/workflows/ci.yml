name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kvbms_test
          POSTGRES_USER: kvbms_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements/development.txt

      - name: Lint with flake8
        run: |
          flake8 backend/ --max-line-length=120 --exclude=migrations,__pycache__

      - name: Format check with black
        run: black --check backend/

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DB_NAME: kvbms_test
          DB_USER: kvbms_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-at-least-50-characters-long
          JWT_SECRET_KEY: ci-test-jwt-secret
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DB_NAME: kvbms_test
          DB_USER: kvbms_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-at-least-50-characters-long
          JWT_SECRET_KEY: ci-test-jwt-secret
        run: |
          cd backend
          pytest tests/backend/ --cov=apps --cov=config --cov-report=xml --cov-fail-under=85 -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type check
        run: npm run type-check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Django image
        run: docker build -f docker/Dockerfiles/Dockerfile.django -t kvbms-django .

      - name: Build FastAPI image
        run: docker build -f docker/Dockerfiles/Dockerfile.fastapi -t kvbms-fastapi .

      - name: Build Frontend image
        run: docker build -f docker/Dockerfiles/Dockerfile.frontend -t kvbms-frontend .
