<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kvbms-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kathmandu Valley Bus Management System - Smart Transit for Nepal" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>KVBMS - Kathmandu Valley Bus Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript style="padding:32px;color:red;font-size:18px">JavaScript is disabled — please enable it.</noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Show fallback if React hasn't mounted after 5 seconds
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML = '<div style="padding:32px;background:#fef2f2;color:#991b1b;font-family:monospace">' +
            '<h2>React did not mount</h2>' +
            '<p>Check browser console (F12) for JavaScript errors.</p>' +
            '</div>';
        }
      }, 5000);
    </script>
  </body>
</html>
