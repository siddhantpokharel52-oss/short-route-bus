events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Docker's internal DNS — resolves service names at request time (not startup)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    limit_req_zone $binary_remote_addr zone=public_api:10m rate=100r/m;
    limit_req_zone $http_authorization zone=auth_api:10m rate=1000r/m;

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        location /public-api/ {
            limit_req zone=public_api burst=20 nodelay;
            set $fastapi_upstream fastapi:8001;
            proxy_pass http://$fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/live/ {
            limit_req zone=auth_api burst=50 nodelay;
            set $fastapi_upstream fastapi:8001;
            proxy_pass http://$fastapi_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600;
        }

        location /ws/v1/ {
            set $fastapi_upstream fastapi:8001;
            proxy_pass http://$fastapi_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600;
        }

        location /ws/ {
            set $django_upstream django:8000;
            proxy_pass http://$django_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600;
        }

        location /api/ {
            limit_req zone=auth_api burst=100 nodelay;
            set $django_upstream django:8000;
            proxy_pass http://$django_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            set $django_upstream django:8000;
            proxy_pass http://$django_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health/ {
            set $django_upstream django:8000;
            proxy_pass http://$django_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            set $fastapi_upstream fastapi:8001;
            proxy_pass http://$fastapi_upstream;
        }

        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
