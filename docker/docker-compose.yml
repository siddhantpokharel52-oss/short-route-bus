services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kvbms
      POSTGRES_USER: kvbms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh:ro
    ports:
      - "5433:5432"   # 5432 in use by local Postgres → expose on 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvbms_user -d kvbms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 6379 in use by local Redis → expose on 6380
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  django:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/Dockerfile.django
    command: >
      sh -c "cd /app/backend &&
             python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ../backend:/app/backend
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/backend:/app
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://kvbms_user:${DB_PASSWORD}@db:5432/kvbms
      - DB_NAME=kvbms
      - DB_USER=kvbms_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001}

  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/Dockerfile.fastapi
    command: uvicorn backend.fastapi_services.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ../backend:/app/backend
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://kvbms_user:${DB_PASSWORD}@db:5432/kvbms
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/Dockerfile.django
    command: sh -c "cd /app/backend && celery -A config worker -l info -Q default,notifications,finance,analytics,emergency"
    volumes:
      - ../backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/backend:/app
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://kvbms_user:${DB_PASSWORD}@db:5432/kvbms
      - DB_NAME=kvbms
      - DB_USER=kvbms_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/Dockerfile.django
    command: sh -c "cd /app/backend && celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - ../backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/backend:/app
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://kvbms_user:${DB_PASSWORD}@db:5432/kvbms
      - DB_NAME=kvbms
      - DB_USER=kvbms_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/Dockerfile.frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3001:3000"   # 3000 in use by previous Docker run → expose on 3001
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_FASTAPI_URL=http://localhost:8001
      - VITE_WS_URL=ws://localhost:8000

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    ports:
      - "8090:80"   # 80 in use by Apache2, 8080 in use by another project's container → expose on 8090
    depends_on:
      - django
      - fastapi
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
